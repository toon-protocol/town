# Crosstown Test Pipeline
# Generated by BMad TEA Agent - Test Architect Module
# Stack: backend (Node.js monorepo) | Framework: Vitest
# Philosophy: No mocks — real crypto, real TOON codec, real local infra
#
# Triggers:
#   PR / push to main  → lint, build, unit tests, integration tests
#   Nightly (2 AM UTC) → full suite including E2E (requires genesis node)
#   Manual dispatch     → selectable test level

name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly E2E at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: false
        default: 'all'
        type: choice
        options:
          - unit
          - integration
          - e2e
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint + Build (required for all tests)
  # ─────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build all packages
        run: pnpm -r build

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

  # ─────────────────────────────────────────────
  # Stage 2: Unit Tests (fast, every PR)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_level == 'unit' ||
      github.event.inputs.test_level == 'all'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Run unit tests
        run: pnpm test -- --reporter=verbose

      - name: Run unit tests with coverage
        if: github.event_name == 'pull_request'
        run: pnpm test:coverage -- --reporter=json --outputFile=coverage-report.json

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-report.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # Stage 3: Integration Tests (medium, every PR)
  # Uses real crypto, real TOON codec — no mocks
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_level == 'integration' ||
      github.event.inputs.test_level == 'all'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Run integration tests (root)
        run: pnpm vitest run --config vitest.integration.config.ts --reporter=verbose

      - name: Run integration tests (core)
        run: pnpm --filter @crosstown/core vitest run --config vitest.integration.config.ts --reporter=verbose

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-artifacts
          path: |
            packages/*/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 4: E2E Tests (nightly or manual only)
  # Requires genesis node infrastructure
  # Uses real local infra: Anvil, relay, connector
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-build
    # Only run on nightly schedule, manual dispatch, or push to main
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_level == 'e2e' ||
        github.event.inputs.test_level == 'all'))

    services:
      anvil:
        image: ghcr.io/foundry-rs/foundry:latest
        ports:
          - 8545:8545
        options: >-
          --health-cmd "cast block-number --rpc-url http://localhost:8545 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Deploy genesis node
        run: ./deploy-genesis-node.sh
        env:
          CI: true

      - name: Wait for services
        run: |
          echo "Waiting for genesis node services..."
          timeout 60 bash -c 'until curl -sf http://localhost:3100/health; do sleep 2; done'
          echo "BLS healthy"
          timeout 60 bash -c 'until curl -sf http://localhost:3500/health; do sleep 2; done'
          echo "Faucet healthy"

      - name: Run E2E tests
        working-directory: packages/client
        run: pnpm test:e2e -- --reporter=verbose
        env:
          CI: true

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            packages/client/test-results/
          retention-days: 7

      - name: Collect service logs on failure
        if: failure()
        run: |
          docker compose -p crosstown-genesis logs > genesis-logs.txt 2>&1 || true

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: genesis-service-logs
          path: genesis-logs.txt
          retention-days: 7

  # ─────────────────────────────────────────────
  # Report: Aggregate results
  # ─────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always() && (github.event_name == 'pull_request')

    steps:
      - name: Generate summary
        run: |
          echo "## Test Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
