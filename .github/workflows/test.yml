# TOON Test Pipeline
# Stack: backend (Node.js monorepo) | Framework: Vitest
# Philosophy: No mocks — real crypto, real TOON codec, real local infra
#
# Triggers:
#   PR / push to main  → lint, build, unit tests, format check
#   Nightly (2 AM UTC) → full suite including E2E (requires genesis node)
#   Manual dispatch     → selectable test level

name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly E2E at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: false
        default: 'all'
        type: choice
        options:
          - unit
          - integration
          - e2e
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint + Build + Format (required for all tests)
  # ─────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build all packages
        run: pnpm -r build

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

  # ─────────────────────────────────────────────
  # Stage 2: Unit Tests (fast, every PR)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_level == 'unit' ||
      github.event.inputs.test_level == 'all'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Run unit tests
        run: pnpm test -- --run --reporter=verbose

      - name: Run unit tests with coverage
        if: github.event_name == 'pull_request'
        run: pnpm test:coverage -- --run --reporter=json --outputFile=coverage-report.json

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-report.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # Stage 2b: Security Audit (every PR)
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --prod || true
        # Non-blocking: transitive deps in @ardrive/turbo-sdk and
        # @toon-protocol/connector have known vulnerabilities with no
        # available patches. Logged for visibility; see .pnpmauditrc
        # for acknowledged vulnerabilities.

  # ─────────────────────────────────────────────
  # Stage 3: Integration Tests
  # Runs on nightly, manual dispatch, or when explicitly requested
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-build
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_level == 'integration' ||
        github.event.inputs.test_level == 'all'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Run integration tests (root)
        run: pnpm vitest run --config vitest.integration.config.ts --reporter=verbose

      - name: Run integration tests (core)
        run: pnpm --filter @toon-protocol/core vitest run --config vitest.integration.config.ts --reporter=verbose

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-artifacts
          path: |
            packages/*/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 4: E2E Tests (nightly or manual only)
  # Requires genesis node infrastructure
  # Uses real local infra: Anvil, relay, connector
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-build
    # Only run on nightly schedule or manual dispatch (requires genesis infrastructure)
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_level == 'e2e' ||
        github.event.inputs.test_level == 'all'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
          key: build-${{ github.sha }}

      - name: Start SDK E2E infrastructure
        run: ./scripts/sdk-e2e-infra.sh up
        env:
          CI: true

      - name: Run SDK E2E tests
        working-directory: packages/sdk
        run: pnpm test:e2e:docker -- --reporter=verbose
        env:
          CI: true

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            packages/*/test-results/
          retention-days: 7

      - name: Collect service logs on failure
        if: failure()
        run: |
          docker compose -p toon-sdk-e2e -f docker-compose-sdk-e2e.yml logs > sdk-e2e-logs.txt 2>&1 || true

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: sdk-e2e-logs.txt
          retention-days: 7

      - name: Tear down E2E infrastructure
        if: always()
        run: ./scripts/sdk-e2e-infra.sh down

  # ─────────────────────────────────────────────
  # Report: Aggregate results
  # ─────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, security-audit]
    if: always() && (github.event_name == 'pull_request')

    steps:
      - name: Generate summary
        run: |
          echo "## Test Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
