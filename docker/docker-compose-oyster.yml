# TOON Oyster CVM Deployment Manifest
#
# Deploys a TOON relay node inside a Marlin Oyster CVM (Confidential
# Virtual Machine) with TEE attestation. This compose file is consumed by
# the `oyster-cvm build --docker-compose` CLI tool.
#
# Architecture (Full-Stack Enclave — Embedded Connector):
#
#   +--------------- Oyster CVM ---------------+
#   |  toon (priority=10):                     |
#   |    Embedded ConnectorNode (BTP:3000)     |
#   |    + Relay (WS:7100) + BLS (HTTP:3100)   |
#   |    + Bootstrap Service                   |
#   |  attestation-server (priority=20):       |
#   |    HTTP (:1300) /attestation/raw         |
#   +-------- vsock proxy --------------------+
#            (inbound/outbound)
#       Public Internet
#
# The connector is EMBEDDED — ConnectorNode runs in-process with the
# TOON node via entrypoint-sdk.js. The enclave is fully self-contained;
# no external connector container is needed.
#
# Marlin's dual-proxy architecture handles networking transparently:
#   - Inbound proxy: Accepts external WebSocket/HTTP, forwards via vsock
#   - Outbound proxy: Tunnels enclave connections (RPC, peers) to external
#   - No application code changes needed
#
# Build enclave image:
#   oyster-cvm build --docker-compose docker/docker-compose-oyster.yml
#
# Deploy to marketplace:
#   oyster-cvm deploy --wallet-key $KEY --duration 1440 \
#     --docker-compose docker/docker-compose-oyster.yml

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TOON Full Node — Embedded Connector + BLS + Nostr Relay + Bootstrap
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Single Node.js process running ConnectorNode (BTP), BLS HTTP server
  # (port 3100), and the Nostr relay WebSocket server (port 7100) via
  # entrypoint-sdk.js. The vsock inbound proxy forwards external
  # connections to these ports.
  toon:
    image: ghcr.io/allidoizcode/toon:oyster
    command: ['node', '/app/entrypoint-sdk.js']
    init: true
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      # Required — operator must set these at deployment time.
      # SECURITY NOTE: NOSTR_SECRET_KEY is a sensitive value. In production Oyster CVM
      # deployments, prefer injecting via Docker secrets or the oyster-cvm deploy
      # --env-file mechanism rather than plain environment variables. Environment
      # variables may be visible to the orchestration layer outside the enclave.
      NODE_ID: ${NODE_ID}
      NOSTR_MNEMONIC: ${NOSTR_MNEMONIC:-}
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY:-}
      ILP_ADDRESS: ${ILP_ADDRESS}

      # Embedded connector — BTP listen port for peer connections
      BTP_SERVER_PORT: ${BTP_SERVER_PORT:-3000}
      BTP_ENDPOINT: ${BTP_ENDPOINT}

      # Settlement (operator configures for their chain)
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:-}
      SETTLEMENT_PRIVATE_KEY: ${SETTLEMENT_PRIVATE_KEY:-}
      SETTLEMENT_REGISTRY_ADDRESS: ${SETTLEMENT_REGISTRY_ADDRESS:-}
      SETTLEMENT_TOKEN_ADDRESS: ${SETTLEMENT_TOKEN_ADDRESS:-}

      # Settlement info (published in kind:10032)
      SUPPORTED_CHAINS: ${SUPPORTED_CHAINS:-}
      # Per-chain env vars (Arbitrum Sepolia: evm:base:421614)
      # Note: These MUST be explicit — env_file vars are not reliably
      # forwarded inside Oyster CVM Docker-in-enclave environments.
      SETTLEMENT_ADDRESS_EVM_BASE_421614: ${SETTLEMENT_ADDRESS_EVM_BASE_421614:-}
      PREFERRED_TOKEN_EVM_BASE_421614: ${PREFERRED_TOKEN_EVM_BASE_421614:-}
      TOKEN_NETWORK_EVM_BASE_421614: ${TOKEN_NETWORK_EVM_BASE_421614:-}

      # Service ports (must match EXPOSE and port mappings)
      BLS_PORT: 3100
      WS_PORT: 7100

      # Pricing
      BASE_PRICE_PER_BYTE: ${BASE_PRICE_PER_BYTE:-10}

      # Asset
      ASSET_CODE: ${ASSET_CODE:-USD}
      ASSET_SCALE: ${ASSET_SCALE:-6}

      # Discovery
      TOON_DISCOVERY: ${TOON_DISCOVERY:-genesis}
      TOON_SEED_RELAYS: ${TOON_SEED_RELAYS:-}
      TOON_PUBLISH_SEED_ENTRY: ${TOON_PUBLISH_SEED_ENTRY:-false}
      TOON_EXTERNAL_RELAY_URL: ${TOON_EXTERNAL_RELAY_URL:-}

      # Bootstrap peers (JSON array, optional)
      BOOTSTRAP_PEERS: ${BOOTSTRAP_PEERS:-[]}

      # x402 (optional HTTP payment on-ramp)
      TOON_X402_ENABLED: ${TOON_X402_ENABLED:-false}

      # Storage
      DATA_DIR: /data

    # Ports exposed via Oyster vsock inbound proxy (no explicit mappings needed):
    #   3000 - BTP (embedded connector, peer connections)
    #   3100 - BLS HTTP API (enriched /health, /handle-packet)
    #   7100 - Nostr Relay WebSocket
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://localhost:$${BLS_PORT:-3100}/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Attestation Server — TEE Attestation Sidecar
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Publishes /attestation/raw endpoint for TEE attestation verification.
  # In Oyster CVM, the real attestation document is provided by the Nitro
  # hypervisor. This placeholder serves the endpoint structure that the
  # Marlin verification tooling expects (Story 4.2 adds real attestation).
  #
  # depends_on with service_healthy ensures the attestation server does
  # NOT start until the TOON node BLS endpoint is healthy, matching
  # the supervisord priority model (toon=10, attestation=20).
  attestation-server:
    image: ghcr.io/allidoizcode/toon:oyster
    command: ['node', '/app/attestation-server.js']
    init: true
    network_mode: host
    restart: unless-stopped
    depends_on:
      toon:
        condition: service_healthy
    environment:
      # Attestation server configuration
      ATTESTATION_PORT: 1300
      ATTESTATION_REFRESH_INTERVAL: ${ATTESTATION_REFRESH_INTERVAL:-300}

      # TEE detection — set automatically by Oyster CVM runtime
      TEE_ENABLED: ${TEE_ENABLED:-false}

      # Identity — needed for signing kind:10033 attestation events
      NOSTR_MNEMONIC: ${NOSTR_MNEMONIC:-}
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY:-}

      # Relay port — attestation server publishes kind:10033 to local relay
      WS_PORT: 7100

      # Chain and relay URL for attestation event tags
      TOON_CHAIN: ${TOON_CHAIN:-31337}
      EXTERNAL_RELAY_URL: ${TOON_EXTERNAL_RELAY_URL:-}

    # Port 1300 exposed via Oyster vsock inbound proxy (no explicit mapping needed):
    #   1300 - Attestation HTTP (/attestation/raw, /health)
