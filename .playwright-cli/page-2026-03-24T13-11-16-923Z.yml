      - generic [ref=e369]:
        - generic [ref=e370]:
          - img "TOON Protocol — Token-Oriented Open Network" [ref=e371]
          - paragraph [ref=e372]: A network where sending a message and sending money are the same action.
          - link "Discord" [ref=e373] [cursor=pointer]:
            - /url: https://discord.gg/whPFHRTwBg
            - img "Discord" [ref=e374]
          - link "X (Twitter)" [ref=e375] [cursor=pointer]:
