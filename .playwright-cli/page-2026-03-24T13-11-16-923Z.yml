        - paragraph [ref=e532]:
          - text: TOON Protocol uses
          - strong [ref=e533]: proven protocols
          - text: —
          - link "ILP" [ref=e534] [cursor=pointer]:
            - /url: https://interledger.org
          - text: for payment routing,
          - link "Nostr" [ref=e535] [cursor=pointer]:
            - /url: https://github.com/nostr-protocol/nips
          - text: for discovery, and EVM smart contracts for settlement. Events are encoded in
          - link "TOON format" [ref=e536] [cursor=pointer]:
            - /url: https://github.com/toon-format/toon
          - text: — compact, human-readable, and LLM-optimized.
        - heading "Use Cases" [level=2] [ref=e537]
        - paragraph [ref=e538]:
          - strong [ref=e539]: Agent-to-Agent Services
          - text: — Agents pay per-byte for exactly what they consume. No API keys, no rate limits, no invoicing. A thousand agents making a million sub-cent requests just works — cost scales linearly with usage, not with infrastructure. Build a service with the
          - link "@toon-protocol/sdk" [ref=e540] [cursor=pointer]:
            - /url: packages/sdk
            - code [ref=e541]: "@toon-protocol/sdk"
          - text: and it's earning from the first packet.
        - paragraph [ref=e542]:
          - strong [ref=e543]: ILP-Gated Nostr Relays
          - text: — Relay operators earn from every write while readers subscribe for free. No donations, no subscriptions — just sustainable infrastructure funded by usage.
          - link "@toon-protocol/town" [ref=e544] [cursor=pointer]:
            - /url: packages/town
            - code [ref=e545]: "@toon-protocol/town"
          - text: "is the reference implementation: one command to run a relay that pays for itself."
        - paragraph [ref=e546]:
          - strong [ref=e547]: Routing
          - text: — Run a peer node. Every message that passes through earns routing fees. More peers, more paths, more revenue. The network grows because participation is profitable.
        - paragraph [ref=e548]:
          - strong [ref=e549]: Agent Swarms
          - text: — A coordinator sends paid tasks to workers. Workers earn by completing them. Thousands of agents collaborating, each earning per-byte for their contribution.
        - heading "Quick Start" [level=2] [ref=e550]
        - code [ref=e552]: npm install @toon-protocol/client @toon-protocol/core @toon-protocol/relay nostr-tools
        - code [ref=e554]: "import { TOONClient } from '@toon-protocol/client'; import { generateSecretKey, getPublicKey, finalizeEvent } from 'nostr-tools/pure'; import { encodeEventToToon, decodeEventFromToon } from '@toon-protocol/relay'; const secretKey = generateSecretKey(); const pubkey = getPublicKey(secretKey); const client = new TOONClient({ connectorUrl: 'http://localhost:8080', secretKey, ilpInfo: { pubkey, ilpAddress: `g.toon.${pubkey.slice(0, 8)}`, btpEndpoint: 'ws://localhost:3000' }, toonEncoder: encodeEventToToon, toonDecoder: decodeEventFromToon, }); await client.start(); await client.publishEvent(finalizeEvent({ kind: 1, content: 'Hello from TOON!', tags: [], created_at: Math.floor(Date.now() / 1000), }, secretKey)); await client.stop();"
        - paragraph [ref=e555]: The client derives your EVM identity from your Nostr key automatically — one key, one identity.
