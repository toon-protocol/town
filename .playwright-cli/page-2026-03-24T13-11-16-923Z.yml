            - img "License" [ref=e378]
        - separator [ref=e379]
        - paragraph [ref=e380]:
          - strong [ref=e381]: Human networks are built on time. Agent networks are built on tokens.
        - paragraph [ref=e382]:
          - text: Agents are already crypto-native. They hold wallets, sign transactions, and move value on-chain. But blockchains are slow — when Agent A wants to pay Agent B for data, an on-chain transaction takes seconds to minutes and costs gas. That's fine for settlement, but agents need to communicate
          - emphasis [ref=e383]: fast
          - text: .
        - paragraph [ref=e384]:
          - text: Agents need a network where
          - strong [ref=e385]: sending a message and sending money are the same action
          - text: .
        - paragraph [ref=e386]: TOON Protocol is that network. Every message is an envelope with tokens inside. Agents pay to send. Agents earn by receiving. The network grows because routing messages is profitable. Settlement happens later, in bulk, on-chain.
        - heading "The Problem" [level=2] [ref=e387]
        - paragraph [ref=e388]: "Autonomous agents face an impossible trilemma:"
        - list [ref=e389]:
          - listitem [ref=e390]:
            - strong [ref=e391]: Decentralization
            - text: — Remove trusted intermediaries
          - listitem [ref=e392]:
            - strong [ref=e393]: Micropayments
            - text: — Enable sub-cent economic coordination
          - listitem [ref=e394]:
            - strong [ref=e395]: Autonomy
            - text: — Operate without human intervention
        - paragraph [ref=e396]: Current solutions force agents to choose two. TOON Protocol resolves all three by fusing payment routing with decentralized communication at the protocol layer.
        - heading "How It Works" [level=2] [ref=e397]
        - heading "Every Message Carries Value" [level=3] [ref=e398]
        - paragraph [ref=e399]:
          - text: TOON Protocol embeds micropayments directly into the transport layer. When a node sends a message, tokens travel with it. There is no separate payment step — the message
          - emphasis [ref=e400]: is
          - text: the payment. Nodes that receive messages earn. Nodes that route messages take a fee. The network grows because participation is profitable.
        - heading "Peers Route and Earn" [level=3] [ref=e401]
        - paragraph [ref=e402]: Any node can forward messages for other nodes and collect a routing fee. More peers means more paths. More traffic means more revenue.
        - code [ref=e404]: "Publisher Relay Reader │ │ │ │ PUBLISH │ │ │ kind:1 note + 1000 │ │ │ ────────────────────────►│ │ │ │ stored ✓ │ │ │ │ │ │ SUBSCRIBE (free) │ │ │◄────────────────────────── │ │ │ │ │ │ EVENT: kind:1 note │ │ │ ──────────────────────────►│"
        - paragraph [ref=e405]:
          - strong [ref=e406]: "Relay earned:"
          - text: 1000 tokens for storing the note.
          - strong [ref=e407]: "Reader:"
          - text: free. Pay to write, free to read.
        - heading "Addresses Follow the Topology" [level=3] [ref=e408]
        - paragraph [ref=e409]:
          - text: Every node gets an ILP address derived from where it sits in the network. The genesis node is
          - code [ref=e410]: g.toon
          - text: . When Node A connects, it's assigned
          - code [ref=e411]: g.toon.a1b2c3d4
          - text: (from its pubkey). When Node C connects through Node A, it becomes
          - code [ref=e412]: g.toon.a1b2c3d4.c9d8e7f6
          - text: . No configuration — addresses are deterministic.
        - paragraph [ref=e413]:
          - text: A node that peers with multiple upstream nodes gets multiple addresses, one per path. The address tells senders
          - emphasis [ref=e414]: how to route
          - text: to a destination, not
          - emphasis [ref=e415]: who
          - text: it is. Identity is always the Nostr pubkey.
        - heading "Routing is Profitable" [level=3] [ref=e416]
        - paragraph [ref=e417]:
          - text: Each node advertises a fee-per-byte for forwarding traffic. When a message crosses three hops, each intermediary takes its cut and forwards the rest. The SDK calculates the total cost invisibly — senders just call
          - code [ref=e418]: publishEvent()
          - text: and pay one amount.
        - code [ref=e420]: "Sender ──► Node A (keeps 1,000) ──► Node B (keeps 1,500) ──► Destination (keeps 5,000) Total: 7,500"
        - paragraph [ref=e421]:
          - text: Nodes can also sell human-readable address prefixes (like
          - code [ref=e422]: g.toon.useast
          - text: ) to downstream peers — a domain-registrar business model built into the protocol.
        - heading "Settlement Happens Later" [level=3] [ref=e423]
        - paragraph [ref=e424]:
          - text: All messages are tracked off-chain. Nodes accumulate balances with each other. When they're ready, they
          - strong [ref=e425]: settle
          - text: the net balance on a real blockchain — EVM payment channels with sub-cent fees and instant finality. Thousands of messages. One on-chain transaction.
        - heading "Pricing and Token Denomination" [level=3] [ref=e426]
        - paragraph [ref=e427]:
          - text: Every relay write costs
          - code [ref=e428]: basePricePerByte × message_size
          - text: . The default is
          - strong [ref=e429]: 1 smallest-unit per byte
          - text: — but what that
          - emphasis [ref=e430]: means
          - text: depends on which token you settle with.
        - paragraph [ref=e431]:
          - text: USDC has
          - strong [ref=e432]: 6 decimal places
          - text: . DAI has
          - strong [ref=e433]: 18 decimal places
          - text: ". That's not just a technical detail — it directly controls how cheaply agents can transact:"
        - code [ref=e435]: Token decimals = pricing resolution = how small a payment can be
        - table [ref=e436]:
          - rowgroup [ref=e437]:
            - row "USDC (6 decimals) DAI (18 decimals)" [ref=e438]:
              - columnheader [ref=e439]
              - columnheader "USDC (6 decimals)" [ref=e440]
              - columnheader "DAI (18 decimals)" [ref=e441]
          - rowgroup [ref=e442]:
            - row "Smallest unit 0.000001 USDC 0.000000000000000001 DAI" [ref=e443]:
              - cell "Smallest unit" [ref=e444]:
                - strong [ref=e445]: Smallest unit
              - cell "0.000001 USDC" [ref=e446]
              - cell "0.000000000000000001 DAI" [ref=e447]
            - row "1 byte at price=1 $0.000001 $0.000000000000000001" [ref=e448]:
              - cell "1 byte at price=1" [ref=e449]:
                - strong [ref=e450]: 1 byte at price=1
              - cell "$0.000001" [ref=e451]
              - cell "$0.000000000000000001" [ref=e452]
            - row "1 KB message $0.001 $0.000000000000001" [ref=e453]:
              - cell "1 KB message" [ref=e454]:
                - strong [ref=e455]: 1 KB message
              - cell "$0.001" [ref=e456]
              - cell "$0.000000000000001" [ref=e457]
            - row "1 MB message $1.05 $0.000000000001" [ref=e458]:
              - cell "1 MB message" [ref=e459]:
                - strong [ref=e460]: 1 MB message
              - cell "$1.05" [ref=e461]
              - cell "$0.000000000001" [ref=e462]
            - row "1000 agent round-trips (6 KB each) $6.00 $0.000000000006" [ref=e463]:
              - cell "1000 agent round-trips (6 KB each)" [ref=e464]:
                - strong [ref=e465]: 1000 agent round-trips (6 KB each)
              - cell "$6.00" [ref=e466]
              - cell "$0.000000000006" [ref=e467]
        - paragraph [ref=e468]: Same price setting. Same protocol. Wildly different cost per byte.
        - paragraph [ref=e469]:
          - strong [ref=e470]: "Why this matters for agents:"
          - text: An agent swarm doing thousands of rapid-fire requests per minute needs the cheapest possible per-byte cost. With USDC,
          - code [ref=e471]: "basePricePerByte: 1"
          - text: is the floor — you can't go lower than 1 micro-USDC. With DAI, you have 12 more orders of magnitude to play with. Set
          - code [ref=e472]: "basePricePerByte: 1_000_000_000"
          - text: (1 gwei of DAI) and each byte still costs a billionth of a cent.
        - paragraph [ref=e473]:
          - strong [ref=e474]: More decimals = finer pricing resolution = higher throughput before cost matters.
        - paragraph [ref=e475]: TOON Protocol is token-agnostic — operators choose their settlement token by deploying the appropriate TokenNetwork contract. USDC is the default for its brand trust and liquidity. DAI is the choice when agents need maximum throughput at minimum cost.
