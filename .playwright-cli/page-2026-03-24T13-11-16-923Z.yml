        - paragraph [ref=e502]:
          - text: "The key insight:"
          - strong [ref=e503]: discovery and payment are the same network.
          - text: Nodes find each other through Nostr, pay each other through ILP, and settle on-chain.
        - heading "Solving the Nostr Business Model" [level=3] [ref=e504]
        - paragraph [ref=e505]: Nostr relays have no sustainable revenue model. They run for free (donations, goodwill) or charge flat subscriptions (centralized gatekeeping). Neither scales. Relay operators burn money or quit.
        - paragraph [ref=e506]:
          - text: TOON Protocol solves this. Every write is a micropayment — relays earn from traffic, not charity. The more useful a relay, the more it earns. Reading stays free.
          - link "@toon-protocol/town" [ref=e507] [cursor=pointer]:
            - /url: packages/town
            - code [ref=e508]: "@toon-protocol/town"
          - text: "is the reference implementation: a Nostr relay where ILP micropayments fund every write and readers subscribe for free."
        - heading "Why TOON Protocol?" [level=2] [ref=e509]
        - table [ref=e510]:
          - rowgroup [ref=e511]:
            - row "Solution What's Missing" [ref=e512]:
