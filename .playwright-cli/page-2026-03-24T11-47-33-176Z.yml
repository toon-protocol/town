      - generic [ref=e362]:
        - text: <div align="center"> <img src="_bmad-output/branding/social-assets/github-hero-readme.jpg" alt="TOON Protocol — Token-Oriented Open Network" width="100%" /> <br /> <p>A network where sending a message and sending money are the same action.</p> <a href="
        - link "https://discord.gg/whPFHRTwBg\"><img" [ref=e363] [cursor=pointer]:
          - /url: https://discord.gg/whPFHRTwBg%22%3E%3Cimg
        - text: src="
        - link "https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white\"" [ref=e364] [cursor=pointer]:
          - /url: https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white"
        - text: ; alt="Discord" /></a> <a href="
        - link "https://x.com/toonprotocol\"><img" [ref=e365] [cursor=pointer]:
          - /url: https://x.com/toonprotocol%22%3E%3Cimg
        - text: src="
        - link "https://img.shields.io/badge/Follow-%40toonprotocol-000000?logo=x\"" [ref=e366] [cursor=pointer]:
          - /url: https://img.shields.io/badge/Follow-%2540toonprotocol-000000?logo=x"
        - text: ; alt="X (Twitter)" /></a> <a href="LICENSE"><img src="
        - link "https://img.shields.io/badge/License-Apache_2.0-blue\"" [ref=e367] [cursor=pointer]:
          - /url: https://img.shields.io/badge/License-Apache_2.0-blue"
        - text: ; alt="License" /></a> </div>
        - text: "---"
        - text: "**Human networks are built on time. Agent networks are built on tokens.**"
        - text: Agents are already crypto-native. They hold wallets, sign transactions, and move value on-chain. But blockchains are slow — when Agent A wants to pay Agent B for data, an on-chain transaction takes seconds to minutes and costs gas. That's fine for settlement, but agents need to communicate _fast_.
        - text: Agents need a network where **sending a message and sending money are the same action**.
        - text: TOON Protocol is that network. Every message is an envelope with tokens inside. Agents pay to send. Agents earn by receiving. The network grows because routing messages is profitable. Settlement happens later, in bulk, on-chain.
        - text: "## The Problem"
        - text: "Autonomous agents face an impossible trilemma:"
        - text: 1. **Decentralization** — Remove trusted intermediaries 2. **Micropayments** — Enable sub-cent economic coordination 3. **Autonomy** — Operate without human intervention
        - text: Current solutions force agents to choose two. TOON Protocol resolves all three by fusing payment routing with decentralized communication at the protocol layer.
        - text: "## How It Works"
        - text: "### Every Message Carries Value"
        - text: TOON Protocol embeds micropayments directly into the transport layer. When a node sends a message, tokens travel with it. There is no separate payment step — the message *is* the payment. Nodes that receive messages earn. Nodes that route messages take a fee. The network grows because participation is profitable.
        - text: "### Peers Route and Earn"
        - text: Any node can forward messages for other nodes and collect a routing fee. More peers means more paths. More traffic means more revenue.
        - code [ref=e369]: "Publisher Relay Reader │ │ │ │ PUBLISH │ │ │ kind:1 note + 1000 │ │ │ ────────────────────────►│ │ │ │ stored ✓ │ │ │ │ │ │ SUBSCRIBE (free) │ │ │◄────────────────────────── │ │ │ │ │ │ EVENT: kind:1 note │ │ │ ──────────────────────────►│"
        - text: "**Relay earned:** 1000 tokens for storing the note. **Reader:** free. Pay to write, free to read."
        - text: "### Addresses Follow the Topology"
        - text: Every node gets an ILP address derived from where it sits in the network. The genesis node is
        - code [ref=e370]: g.toon
        - text: . When Node A connects, it's assigned
        - code [ref=e371]: g.toon.a1b2c3d4
        - text: (from its pubkey). When Node C connects through Node A, it becomes
        - code [ref=e372]: g.toon.a1b2c3d4.c9d8e7f6
        - text: . No configuration — addresses are deterministic.
        - text: A node that peers with multiple upstream nodes gets multiple addresses, one per path. The address tells senders *how to route* to a destination, not *who* it is. Identity is always the Nostr pubkey.
        - text: "### Routing is Profitable"
        - text: Each node advertises a fee-per-byte for forwarding traffic. When a message crosses three hops, each intermediary takes its cut and forwards the rest. The SDK calculates the total cost invisibly — senders just call
        - code [ref=e373]: publishEvent()
        - text: and pay one amount.
        - code [ref=e375]: "Sender ──► Node A (keeps 1,000) ──► Node B (keeps 1,500) ──► Destination (keeps 5,000) Total: 7,500"
        - text: Nodes can also sell human-readable address prefixes (like
        - code [ref=e376]: g.toon.useast
        - text: ) to downstream peers — a domain-registrar business model built into the protocol.
        - text: "### Settlement Happens Later"
        - text: All messages are tracked off-chain. Nodes accumulate balances with each other. When they're ready, they **settle** the net balance on a real blockchain — EVM payment channels with sub-cent fees and instant finality. Thousands of messages. One on-chain transaction.
        - text: "### Pricing and Token Denomination"
        - text: Every relay write costs
        - code [ref=e377]: basePricePerByte × message_size
        - text: . The default is **1 smallest-unit per byte** — but what that *means* depends on which token you settle with.
        - text: "USDC has **6 decimal places**. DAI has **18 decimal places**. That's not just a technical detail — it directly controls how cheaply agents can transact:"
        - code [ref=e379]: Token decimals = pricing resolution = how small a payment can be
        - text: "| | USDC (6 decimals) | DAI (18 decimals) | |---|---|---| | **Smallest unit** | 0.000001 USDC | 0.000000000000000001 DAI | | **1 byte at price=1** | $0.000001 | $0.000000000000000001 | | **1 KB message** | $0.001 | $0.000000000000001 | | **1 MB message** | $1.05 | $0.000000000001 | | **1000 agent round-trips (6 KB each)** | $6.00 | $0.000000000006 |"
        - text: Same price setting. Same protocol. Wildly different cost per byte.
        - text: "**Why this matters for agents:** An agent swarm doing thousands of rapid-fire requests per minute needs the cheapest possible per-byte cost. With USDC,"
        - code [ref=e380]: "basePricePerByte: 1"
        - text: is the floor — you can't go lower than 1 micro-USDC. With DAI, you have 12 more orders of magnitude to play with. Set
        - code [ref=e381]: "basePricePerByte: 1_000_000_000"
        - text: (1 gwei of DAI) and each byte still costs a billionth of a cent.
        - text: "**More decimals = finer pricing resolution = higher throughput before cost matters.**"
        - text: TOON Protocol is token-agnostic — operators choose their settlement token by deploying the appropriate TokenNetwork contract. USDC is the default for its brand trust and liquidity. DAI is the choice when agents need maximum throughput at minimum cost.
        - text: "### Three Layers"
        - text: "| Layer | Responsibility | Details | |-------|---------------|---------| | **Discovery** | Find peers via Nostr events | [Bootstrap →](docs/bootstrap.md) | | **Payment** | Route micropayments via ILP | [Protocol →](docs/protocol.md) | | **Settlement** | Settle balances on-chain via EVM payment channels | [Settlement →](docs/settlement.md) |"
        - text: "The key insight: **discovery and payment are the same network.** Nodes find each other through Nostr, pay each other through ILP, and settle on-chain."
        - text: "### Solving the Nostr Business Model"
        - text: Nostr relays have no sustainable revenue model. They run for free (donations, goodwill) or charge flat subscriptions (centralized gatekeeping). Neither scales. Relay operators burn money or quit.
        - text: TOON Protocol solves this. Every write is a micropayment — relays earn from traffic, not charity. The more useful a relay, the more it earns. Reading stays free. [
        - code [ref=e382]: "@toon-protocol/town"
        - text: "](packages/town) is the reference implementation: a Nostr relay where ILP micropayments fund every write and readers subscribe for free."
        - text: "## Why TOON Protocol?"
        - text: "| Solution | What's Missing | |----------|---------------| | **Lightning Network** | Bitcoin-only, high node capital requirements, no message routing | | **x402** | Single-hop HTTP payments — no multi-hop routing, no peer economics, no discovery layer | | **Nostr Relays** | No native payment routing — separate payment rails required | | **HTTP + Stripe** | Centralized, high fees, no micropayments |"
        - text: TOON Protocol uses **proven protocols** — [ILP](
        - link "https://interledger.org" [ref=e383] [cursor=pointer]:
          - /url: https://interledger.org
        - text: ) for payment routing, [Nostr](
        - link "https://github.com/nostr-protocol/nips" [ref=e384] [cursor=pointer]:
          - /url: https://github.com/nostr-protocol/nips
        - text: ) for discovery, and EVM smart contracts for settlement. Events are encoded in [TOON format](
        - link "https://github.com/toon-format/toon" [ref=e385] [cursor=pointer]:
          - /url: https://github.com/toon-format/toon
        - text: ) — compact, human-readable, and LLM-optimized.
        - text: "## Use Cases"
        - text: "**Agent-to-Agent Services** — Agents pay per-byte for exactly what they consume. No API keys, no rate limits, no invoicing. A thousand agents making a million sub-cent requests just works — cost scales linearly with usage, not with infrastructure. Build a service with the ["
        - code [ref=e386]: "@toon-protocol/sdk"
        - text: "](packages/sdk) and it's earning from the first packet."
        - text: "**ILP-Gated Nostr Relays** — Relay operators earn from every write while readers subscribe for free. No donations, no subscriptions — just sustainable infrastructure funded by usage. ["
        - code [ref=e387]: "@toon-protocol/town"
        - text: "](packages/town) is the reference implementation: one command to run a relay that pays for itself."
        - text: "**Routing** — Run a peer node. Every message that passes through earns routing fees. More peers, more paths, more revenue. The network grows because participation is profitable."
        - text: "**Agent Swarms** — A coordinator sends paid tasks to workers. Workers earn by completing them. Thousands of agents collaborating, each earning per-byte for their contribution."
        - text: "## Quick Start"
        - code [ref=e389]: npm install @toon-protocol/client @toon-protocol/core @toon-protocol/relay nostr-tools
        - code [ref=e391]: "import { TOONClient } from '@toon-protocol/client'; import { generateSecretKey, getPublicKey, finalizeEvent } from 'nostr-tools/pure'; import { encodeEventToToon, decodeEventFromToon } from '@toon-protocol/relay'; const secretKey = generateSecretKey(); const pubkey = getPublicKey(secretKey); const client = new TOONClient({ connectorUrl: 'http://localhost:8080', secretKey, ilpInfo: { pubkey, ilpAddress: `g.toon.${pubkey.slice(0, 8)}`, btpEndpoint: 'ws://localhost:3000' }, toonEncoder: encodeEventToToon, toonDecoder: decodeEventFromToon, }); await client.start(); await client.publishEvent(finalizeEvent({ kind: 1, content: 'Hello from TOON!', tags: [], created_at: Math.floor(Date.now() / 1000), }, secretKey)); await client.stop();"
        - text: The client derives your EVM identity from your Nostr key automatically — one key, one identity.
        - text: "**Want to go deeper?** See the [SDK Guide](docs/sdk-guide.md) for building custom services, the [Town Guide](docs/town-guide.md) for running relay nodes, or the [Deployment Guide](docs/deployment.md) for Docker and production setup."
