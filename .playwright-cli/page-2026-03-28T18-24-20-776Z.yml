            - heading "Welcome to Forgejo" [level=1] [ref=e971]:
              - link [ref=e972] [cursor=pointer]:
                - /url: "#"
              - text: Welcome to Forgejo
            - paragraph [ref=e973]:
              - text: Hi there! Tired of big platforms playing monopoly? Providing Git hosting for your project, friends, company or community?
              - strong [ref=e974]: Forgejo
              - text: (/for'd͡ʒe.jo/ inspired by forĝejo – the Esperanto word for
              - emphasis [ref=e975]: forge
              - text: ) has you covered with its intuitive interface, light and easy hosting and a lot of built-in functionality.
            - paragraph [ref=e976]:
              - text: Forgejo was
              - link "created in 2022" [ref=e977] [cursor=pointer]:
                - /url: https://forgejo.org/2022-12-15-hello-forgejo/
              - text: "because we think that the project should be owned by an independent community. If you second that, then Forgejo is for you! Our promise:"
              - strong [ref=e978]: Independent Free/Libre Software forever!
            - heading "What does Forgejo offer?" [level=2] [ref=e979]:
              - link [ref=e980] [cursor=pointer]:
                - /url: "#what-does-forgejo-offer"
              - text: What does Forgejo offer?
            - paragraph [ref=e981]: "If you like any of the following, Forgejo is literally meant for you:"
            - list [ref=e982]:
              - listitem [ref=e983]:
                - text: "Lightweight: Forgejo can easily be hosted on nearly"
                - strong [ref=e984]: every machine
                - text: . Running on a Raspberry? Small cloud instance? No problem!
              - listitem [ref=e985]:
                - text: "Project management: Besides Git hosting, Forgejo offers issues, pull requests, wikis, kanban boards and much more to"
                - strong [ref=e986]: coordinate with your team
                - text: .
              - listitem [ref=e987]:
                - text: "Publishing: Have something to share? Use"
                - strong [ref=e988]: releases
                - text: to host your software for download, or use the
                - strong [ref=e989]: package registry
                - text: to publish it for docker, npm and many other package managers.
              - listitem [ref=e990]:
                - text: "Customizable: Want to change your look? Change some settings? There are many"
                - strong [ref=e991]: config switches
                - text: to make Forgejo work exactly like you want.
              - listitem [ref=e992]:
                - text: "Powerful: Organizations & team permissions, CI integration, Code Search, LDAP, OAuth and much more. If you have"
                - strong [ref=e993]: advanced needs
                - text: ", Forgejo has you covered."
              - listitem [ref=e994]:
                - text: "Privacy: From update checker to default settings: Forgejo is built to be"
                - strong [ref=e995]: privacy first
                - text: for you and your crew.
              - listitem [ref=e996]:
                - text: "Federation: (WIP) We are actively working to connect software forges with each other through"
                - strong [ref=e997]: ActivityPub
                - text: ", and create a collaborative network of personal instances."
            - heading "Learn more" [level=2] [ref=e998]:
              - link [ref=e999] [cursor=pointer]:
                - /url: "#learn-more"
              - text: Learn more
            - paragraph [ref=e1000]:
              - text: Dive into the
