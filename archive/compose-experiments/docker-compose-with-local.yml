# Crosstown + Connector + Anvil (Local Development Stack)
# Complete local development environment with:
# - Anvil (local Ethereum blockchain)
# - Auto-deployed payment channel contracts
# - Forgejo (ILP-gated Git hosting)
# - Pre-funded test wallets
#
# This mirrors docker-compose-testnet.yml but runs entirely locally with no external dependencies.

networks:
  crosstown-network:
    driver: bridge

volumes:
  crosstown-data:
  connector-data:
  forgejo-data:

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Anvil - Local Ethereum Node for Payment Channels
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: crosstown-anvil
    entrypoint: []
    command:
      - sh
      - -c
      - |
        echo "Starting Anvil..."
        anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --accounts 10 --balance 10000 &
        ANVIL_PID=$$!

        echo "Waiting for Anvil to be ready..."
        until cast client --rpc-url http://localhost:8545 2>/dev/null | grep -q 'anvil'; do
          sleep 1
        done

        echo "Deploying contracts..."
        cd /contracts
        forge script script/DeployLocal.s.sol:DeployLocalScript --rpc-url http://localhost:8545 --broadcast --skip-simulation || echo "Deployment failed (non-fatal)"

        echo "Anvil ready with contracts deployed!"
        wait $$ANVIL_PID
    volumes:
      - ../connector/packages/contracts:/contracts
    ports:
      - '8545:8545'
    networks:
      - crosstown-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "cast client --rpc-url http://localhost:8545 2>&1 | grep -q 'anvil' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Contract deployer removed - Anvil now deploys contracts on startup via init script

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Token Faucet - Provides ETH and AGENT tokens for testing
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  faucet:
    build:
      context: ./packages/faucet
      dockerfile: Dockerfile
    container_name: crosstown-faucet
    environment:
      PORT: 3500
      RPC_URL: http://anvil:8545

      # Account 1 for ETH (has 10k ETH from Anvil)
      ETH_PRIVATE_KEY: '0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d'

      # Account 0 (deployer) for AGENT tokens
      TOKEN_PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'

      # Token address (set after deployment or let faucet discover it)
      TOKEN_ADDRESS: ${BASE_TOKEN_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}

      # Amounts to send per request
      ETH_AMOUNT: ${FAUCET_ETH_AMOUNT:-100}
      TOKEN_AMOUNT: ${FAUCET_TOKEN_AMOUNT:-10000}

      # Rate limiting (hours)
      RATE_LIMIT_HOURS: ${FAUCET_RATE_LIMIT_HOURS:-1}

    ports:
      - '3500:3500' # Faucet Web UI
    networks:
      - crosstown-network
    depends_on:
      anvil:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3500/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Connector - ILP Packet Routing + Payment Channels
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  connector:
    image: connector:1.19.1
    container_name: crosstown-connector
    environment:
      # Environment mode
      ENVIRONMENT: development

      # Local delivery to Crosstown BLS
      LOCAL_DELIVERY_URL: http://crosstown:3100

      # Enable BASE blockchain for payment channels
      BASE_ENABLED: 'true'
      BASE_RPC_URL: http://anvil:8545
      BASE_CHAIN_ID: '31337'

      # Anvil test account #0 private key (well-known)
      BASE_PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'

      # Payment channel contract addresses (deployed by contract-deployer)
      # These are deterministic addresses from Anvil deployment
      BASE_TOKEN_ADDRESS: ${BASE_TOKEN_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      BASE_REGISTRY_ADDRESS: ${BASE_REGISTRY_ADDRESS:-0xe7f1725e7734ce288f8367e1bb143e90bb3f0512}

      # Optional: Enable Explorer UI
      EXPLORER_ENABLED: ${EXPLORER_ENABLED:-true}

    ports:
      - '3000:3000' # BTP Server
      - '8080:8080' # Health check
      - '8081:8081' # Admin API
      - '3001:3001' # Explorer UI
    volumes:
      - connector-data:/data
      - ./config/connector-config-with-base.yaml:/app/config.yaml:ro
    networks:
      - crosstown-network
    depends_on:
      anvil:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Crosstown Full Node - BLS + Nostr Relay + Bootstrap
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  crosstown:
    image: crosstown:optimized
    container_name: crosstown-node
    environment:
      # Required Configuration
      NODE_ID: ${NODE_ID:-my-crosstown-node}
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY}
      ILP_ADDRESS: ${ILP_ADDRESS:-g.crosstown.my-node}

      # Connector Integration (External Mode via HTTP)
      CONNECTOR_ADMIN_URL: http://connector:8081
      CONNECTOR_URL: http://connector:8080
      BTP_ENDPOINT: ${BTP_ENDPOINT:-ws://connector:3000}

      # Service Ports
      BLS_PORT: 3100
      WS_PORT: 7100

      # Pricing
      BASE_PRICE_PER_BYTE: ${BASE_PRICE_PER_BYTE:-10}
      SPSP_MIN_PRICE: ${SPSP_MIN_PRICE:-5}

      # Asset
      ASSET_CODE: ${ASSET_CODE:-USD}
      ASSET_SCALE: ${ASSET_SCALE:-6}

      # Bootstrap & Peer Discovery
      BOOTSTRAP_RELAYS: ${BOOTSTRAP_RELAYS:-}
      BOOTSTRAP_PEERS: ${BOOTSTRAP_PEERS:-}
      ARDRIVE_ENABLED: ${ARDRIVE_ENABLED:-true}

      # Settlement (EVM/BASE)
      PEER_EVM_ADDRESS: ${PEER_EVM_ADDRESS:-}
      M2M_TOKEN_ADDRESS: ${M2M_TOKEN_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}

      # NIP-34 Git Integration (Forgejo)
      FORGEJO_URL: ${FORGEJO_URL:-http://forgejo:3000}
      FORGEJO_TOKEN: ${FORGEJO_TOKEN:-}
      FORGEJO_OWNER: ${FORGEJO_OWNER:-crosstown}

      # Storage
      DATA_DIR: /data

    ports:
      - '3100:3100' # BLS HTTP API
      - '7100:7100' # Nostr Relay WebSocket
    volumes:
      - crosstown-data:/data
    networks:
      - crosstown-network
    depends_on:
      connector:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3100/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Forgejo - Git Infrastructure (Web UI + Storage)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: crosstown-forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__ROOT_URL=http://localhost:3004/
      - FORGEJO__security__INSTALL_LOCK=true

      # Git operations (git-proxy disabled, using direct access)
      - FORGEJO__repository__DISABLE_HTTP_GIT=false # Allow HTTP Git operations
      - FORGEJO__repository__ENABLE_PUSH_CREATE_USER=false # No auto-create on push
      - FORGEJO__repository__ENABLE_PUSH_CREATE_ORG=false

      # Web editor (enabled since git-proxy is disabled)
      # Note: NIP-34 integration still provides payment-gated Git via Nostr events
      - FORGEJO__repository__ENABLE_EDITOR_UPLOAD=true # Allow file uploads via web
      - FORGEJO__repository__DISABLE_DOWNLOAD_SOURCE_ARCHIVES=false # Allow downloads

    ports:
      - '3004:3000' # Web UI (direct access, free browsing)
    volumes:
      - forgejo-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - crosstown-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Git Proxy - DISABLED (Not ILP-spec compliant yet)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Temporarily disabled - needs to be redesigned to use ILP over HTTP (RFC-0035)
  # See: https://interledger.org/developers/rfcs/ilp-over-http/
  #
  # git-proxy:
  #   build:
  #     context: .
  #     dockerfile: packages/git-proxy/Dockerfile
  #   container_name: crosstown-git-proxy
  #   environment:
  #     GIT_PROXY_PORT: 3002
  #     FORGEJO_URL: http://forgejo:3000
  #     BLS_URL: http://crosstown:3100
  #     READ_PRICE: ${GIT_READ_PRICE:-100}
  #     WRITE_PRICE: ${GIT_WRITE_PRICE:-1000}
  #     PRICE_PER_KB: ${GIT_PRICE_PER_KB:-10}
  #     REJECT_NON_GIT: ${REJECT_NON_GIT:-true}
  #     NODE_ID: git-proxy
  #     VERBOSE: ${GIT_PROXY_VERBOSE:-true}
  #   ports:
  #     - "3003:3002"
  #   networks:
  #     - crosstown-network
  #   depends_on:
  #     forgejo:
  #       condition: service_healthy
  #     crosstown:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Quick Start Guide
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 1. Start the stack:
#    docker compose -f docker-compose-with-local.yml up -d
#
# 2. Get deployed contract addresses:
#    docker compose -f docker-compose-with-local.yml logs contract-deployer | grep "deployed to"
#
# 3. Optional: Set contract addresses in .env:
#    BASE_TOKEN_ADDRESS=0x...
#    BASE_REGISTRY_ADDRESS=0x...
#
# 4. Access services:
#    - Token Faucet:      http://localhost:3500  ⭐ Start here!
#    - Anvil RPC:         http://localhost:8545
#    - Connector Health:  http://localhost:8080/health
#    - Explorer UI:       http://localhost:3001
#    - Crosstown BLS:     http://localhost:3100
#    - Nostr Relay:       ws://localhost:7100
#    - Forgejo Web UI:    http://localhost:3004
#    - Forgejo Git HTTP:  http://localhost:3004 (same as web, no payment required)
#
# 5. Get tokens for your wallet:
#    🚰 Easy way: Use the faucet at http://localhost:3500
#       - Enter your wallet address
#       - Get 100 ETH + 10,000 AGENT tokens instantly
#       - Rate limit: 1 request per address per hour
#
#    💻 Manual way (using Foundry cast):
#       Get token address:
#         docker compose -f docker-compose-with-local.yml logs contract-deployer | grep "AGENT_TOKEN_ADDRESS"
#
#       Transfer tokens:
#         cast send <TOKEN_ADDRESS> "transfer(address,uint256)" <YOUR_ADDRESS> 100000000000000000000000 \
#           --rpc-url http://localhost:8545 \
#           --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
#
#       Check balance:
#         cast call <TOKEN_ADDRESS> "balanceOf(address)(uint256)" <ADDRESS> --rpc-url http://localhost:8545
#
# 6. Pre-funded Anvil test accounts (all have 10,000 ETH):
#    Account 0 (Deployer - has 1M AGENT tokens):
#      Address:  0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
#      Private:  0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
#
#    Account 1 (Faucet ETH source):
#      Address:  0x70997970C51812dc3A010C7d01b50e0d17dc79C8
#      Private:  0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
#
#    Account 2:
#      Address:  0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC
#      Private:  0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a
#
# 7. Stop the stack:
#    docker compose -f docker-compose-with-local.yml down
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Faucet Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Customize faucet behavior via environment variables in .env:
#
#   FAUCET_ETH_AMOUNT=100           # ETH per request (default: 100)
#   FAUCET_TOKEN_AMOUNT=10000       # AGENT tokens per request (default: 10000)
#   FAUCET_RATE_LIMIT_HOURS=1       # Hours between requests (default: 1)
#
