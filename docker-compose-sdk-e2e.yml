# SDK E2E Test Stack — Embedded Connector (Multi-Chain)
#
# Minimal infrastructure for testing SDK createNode() with embedded ConnectorNode.
# Each peer is a single container (no external connector needed).
#
# Chains: EVM (Anvil) + Solana (test-validator) + Mina (lightnet)
# Privacy: NIP-59 gift wrapping enabled on both peers
#
# Usage:
#   ./scripts/sdk-e2e-infra.sh up     # Start infrastructure
#   ./scripts/sdk-e2e-infra.sh down   # Stop infrastructure
#
# Architecture:
#   Anvil (EVM contracts) + Solana (programs) + Mina (lightnet)
#   → Peer1 (genesis-like) → Peer2 (bootstraps from Peer1)

networks:
  toon-sdk-e2e:
    driver: bridge

volumes:
  peer1-data:
  peer2-data:

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Anvil - Local Ethereum with auto-deployed contracts
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: sdk-e2e-anvil
    entrypoint: []
    command:
      - sh
      - -c
      - |
        echo "Starting Anvil..."
        anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --accounts 10 --balance 10000 &
        ANVIL_PID=$$!

        echo "Waiting for Anvil to be ready..."
        until cast client --rpc-url http://localhost:8545 2>/dev/null | grep -q 'anvil'; do
          sleep 1
        done

        echo "Deploying contracts..."
        cd /contracts
        forge script script/DeployLocal.s.sol:DeployLocalScript --rpc-url http://localhost:8545 --broadcast --skip-simulation || echo "Deployment failed (non-fatal)"

        echo "Funding test accounts with Mock USDC..."
        # DeployLocal.s.sol only funds Accounts #2 and #3.
        # Fund Accounts #4-#9 so each E2E test file has its own funded account.
        # MockERC20 at 0x5FbDB2315678afecb367f032d93F642f64180aa3
        # transfer(address,uint256) selector = 0xa9059cbb
        # Using Account #0 (deployer) private key to send tokens.
        DEPLOYER_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
        TOKEN=0x5FbDB2315678afecb367f032d93F642f64180aa3
        AMOUNT=10000000000000000000000  # 10k tokens (18 decimals)
        for ADDR in \
          0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65 \
          0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc \
          0x976EA74026E726554dB657fA54763abd0C3a0aa9 \
          0x14dC79964da2C08b23698B3D3cc7Ca32193d9955 \
          0x23618e81E3f5cdF7f54C3d65f7FBc0aBf5B21E8f \
          0xa0Ee7A142d267C1f36714E4a8F75612F20a79720; do
          cast send --rpc-url http://localhost:8545 --private-key $$DEPLOYER_KEY \
            $$TOKEN "transfer(address,uint256)" $$ADDR $$AMOUNT 2>/dev/null \
            && echo "Funded $$ADDR" || echo "Fund $$ADDR failed (non-fatal)"
        done

        echo "Anvil ready with contracts deployed!"
        wait $$ANVIL_PID
    volumes:
      - ./contracts/evm:/contracts
    ports:
      - '18545:8545'
    networks:
      - toon-sdk-e2e
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "cast client --rpc-url http://localhost:8545 2>&1 | grep -q 'anvil' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Solana Test Validator - Local Solana with Auto-Deployed Programs
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  solana-validator:
    image: ghcr.io/beeman/solana-test-validator:latest
    container_name: sdk-e2e-solana
    entrypoint: []
    command:
      - sh
      - /entrypoint.sh
    volumes:
      - ./infra/solana/entrypoint.sh:/entrypoint.sh:ro
      - ./contracts/solana:/programs:ro
    tmpfs:
      - /tmp/test-ledger
    ports:
      - '19899:8899'   # RPC
      - '19900:8900'   # WebSocket
    networks:
      - toon-sdk-e2e
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'solana cluster-version --url http://localhost:8899 >/dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Mina Lightnet - Local Mina Network with Accounts Manager
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # NOTE: Mina lightnet requires 4-8 GB RAM. Ensure Docker Desktop has
  # sufficient memory allocated (at least 8 GB recommended).
  mina-lightnet:
    image: o1labs/mina-local-network:compatible-latest-lightnet
    container_name: sdk-e2e-mina
    environment:
      NETWORK_TYPE: single-node
      PROOF_LEVEL: none
      LOG_LEVEL: Info
      RUN_ARCHIVE_NODE: 'false'
      SLOT_TIME: '20000'
    ports:
      - '19085:3101'   # GraphQL (direct to daemon, bypassing nginx proxy)
      - '19181:8181'   # Accounts Manager
    networks:
      - toon-sdk-e2e
    deploy:
      resources:
        limits:
          memory: 4g
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf -X POST -H "Content-Type: application/json" -d "{\"query\":\"{syncStatus}\"}" http://localhost:3101/graphql | grep -q SYNCED || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Peer 1 — Genesis-like node (no bootstrap peers)
  # Anvil Account #0 for settlement
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  peer1:
    image: toon:optimized
    container_name: sdk-e2e-peer1
    command: ['node', '/app/entrypoint-sdk.js']
    environment:
      # Identity
      NODE_ID: peer1
      # Deterministic Nostr key for peer1 (sha256 of "sdk-e2e-peer1-secret")
      NOSTR_SECRET_KEY: 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2'
      ILP_ADDRESS: g.toon.peer1

      # Embedded connector (Docker-internal, TLS unnecessary)
      BTP_SERVER_PORT: '3000'
      BTP_ENDPOINT: 'ws://peer1:3000' # nosemgrep: detect-insecure-websocket

      # Settlement (Anvil Account #0 — deployer, has all tokens)
      SETTLEMENT_RPC_URL: http://anvil:8545
      SETTLEMENT_PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
      SETTLEMENT_REGISTRY_ADDRESS: '0xe7f1725e7734ce288f8367e1bb143e90bb3f0512'
      SETTLEMENT_TOKEN_ADDRESS: '0x5FbDB2315678afecb367f032d93F642f64180aa3' # Mock USDC (Anvil)

      # Settlement info (published in kind:10032)
      # Peer1: all chains, prefers EVM
      SUPPORTED_CHAINS: 'evm:base:31337,solana:devnet,mina:devnet'
      SETTLEMENT_ADDRESS_EVM_BASE_31337: '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'
      PREFERRED_TOKEN_EVM_BASE_31337: '0x5FbDB2315678afecb367f032d93F642f64180aa3' # Mock USDC (Anvil)
      TOKEN_NETWORK_EVM_BASE_31337: '0xCafac3dD18aC6c6e92c921884f9E4176737C052c'
      SETTLEMENT_ADDRESS_SOLANA_DEVNET: '${PEER1_SOLANA_TOKEN_ACCOUNT}'
      PREFERRED_TOKEN_SOLANA_DEVNET: '${SOLANA_TOKEN_MINT}'
      TOKEN_NETWORK_SOLANA_DEVNET: '${SOLANA_PROGRAM_ID}'
      SETTLEMENT_ADDRESS_MINA_DEVNET: '${PEER1_MINA_ACCOUNT}'
      PREFERRED_TOKEN_MINA_DEVNET: 'MINA'
      TOKEN_NETWORK_MINA_DEVNET: '${MINA_ZKAPP_ADDRESS}'

      # Service ports
      BLS_PORT: '3100'
      WS_PORT: '7100'

      # Pricing
      BASE_PRICE_PER_BYTE: '10'
      ASSET_CODE: USD
      ASSET_SCALE: '6'

      # No bootstrap peers (genesis)
      # Arweave DVM: enabled on peer1 (provider), uses free tier (<=100KB)
      ARDRIVE_ENABLED: 'true'

      # Multi-chain settlement (Solana + Mina)
      SOLANA_RPC_URL: http://solana-validator:8899
      SOLANA_PROGRAM_ID: '${SOLANA_PROGRAM_ID}'
      SOLANA_KEY_ID: 'solana-settlement'
      MINA_GRAPHQL_URL: http://mina-lightnet:3101/graphql
      MINA_ACCOUNTS_MANAGER_URL: http://mina-lightnet:8181
      MINA_ZKAPP_ADDRESS: '${MINA_ZKAPP_ADDRESS}'
      MINA_KEY_ID: 'mina-settlement'

      # NIP-59 privacy wrapping
      NIP59_ENABLED: 'true'
      NIP59_PEER_PUBKEYS: ${PEER1_NIP59_PEER_PUBKEYS:-}

      # Storage
      DATA_DIR: /data
    ports:
      - '19000:3000'  # BTP
      - '19100:3100'  # BLS
      - '19700:7100'  # WS Relay
    volumes:
      - peer1-data:/data
    networks:
      - toon-sdk-e2e
    depends_on:
      anvil:
        condition: service_healthy
      solana-validator:
        condition: service_healthy
      mina-lightnet:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3100/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Peer 2 — Bootstraps from Peer 1
  # Anvil Account #2 for settlement
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  peer2:
    image: toon:optimized
    container_name: sdk-e2e-peer2
    command: ['node', '/app/entrypoint-sdk.js']
    environment:
      # Identity
      NODE_ID: peer2
      # Deterministic Nostr key for peer2
      NOSTR_SECRET_KEY: 'b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3'
      ILP_ADDRESS: g.toon.peer2

      # Embedded connector (Docker-internal, TLS unnecessary)
      BTP_SERVER_PORT: '3000'
      BTP_ENDPOINT: 'ws://peer2:3000' # nosemgrep: detect-insecure-websocket

      # Settlement (Anvil Account #2)
      SETTLEMENT_RPC_URL: http://anvil:8545
      SETTLEMENT_PRIVATE_KEY: '0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a'
      SETTLEMENT_REGISTRY_ADDRESS: '0xe7f1725e7734ce288f8367e1bb143e90bb3f0512'
      SETTLEMENT_TOKEN_ADDRESS: '0x5FbDB2315678afecb367f032d93F642f64180aa3' # Mock USDC (Anvil)

      # Settlement info (published in kind:10032)
      # Peer2: all chains, prefers Solana (different order for mixed-chain E2E testing)
      SUPPORTED_CHAINS: 'solana:devnet,evm:base:31337,mina:devnet'
      SETTLEMENT_ADDRESS_EVM_BASE_31337: '0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC'
      PREFERRED_TOKEN_EVM_BASE_31337: '0x5FbDB2315678afecb367f032d93F642f64180aa3' # Mock USDC (Anvil)
      TOKEN_NETWORK_EVM_BASE_31337: '0xCafac3dD18aC6c6e92c921884f9E4176737C052c'
      SETTLEMENT_ADDRESS_SOLANA_DEVNET: '${PEER2_SOLANA_TOKEN_ACCOUNT}'
      PREFERRED_TOKEN_SOLANA_DEVNET: '${SOLANA_TOKEN_MINT}'
      TOKEN_NETWORK_SOLANA_DEVNET: '${SOLANA_PROGRAM_ID}'
      SETTLEMENT_ADDRESS_MINA_DEVNET: '${PEER2_MINA_ACCOUNT}'
      PREFERRED_TOKEN_MINA_DEVNET: 'MINA'
      TOKEN_NETWORK_MINA_DEVNET: '${MINA_ZKAPP_ADDRESS}'

      # Service ports
      BLS_PORT: '3100'
      WS_PORT: '7100'

      # Pricing
      BASE_PRICE_PER_BYTE: '10'
      ASSET_CODE: USD
      ASSET_SCALE: '6'

      # Bootstrap from Peer 1 (pubkey derived from peer1's NOSTR_SECRET_KEY)
      BOOTSTRAP_PEERS: ${PEER2_BOOTSTRAP_PEERS:-[]}

      ARDRIVE_ENABLED: 'false'

      # Multi-chain settlement (Solana + Mina)
      SOLANA_RPC_URL: http://solana-validator:8899
      SOLANA_PROGRAM_ID: '${SOLANA_PROGRAM_ID}'
      SOLANA_KEY_ID: 'solana-settlement'
      MINA_GRAPHQL_URL: http://mina-lightnet:3101/graphql
      MINA_ACCOUNTS_MANAGER_URL: http://mina-lightnet:8181
      MINA_ZKAPP_ADDRESS: '${MINA_ZKAPP_ADDRESS}'
      MINA_KEY_ID: 'mina-settlement'

      # NIP-59 privacy wrapping
      NIP59_ENABLED: 'true'
      NIP59_PEER_PUBKEYS: ${PEER2_NIP59_PEER_PUBKEYS:-}

      # Storage
      DATA_DIR: /data
    ports:
      - '19010:3000'  # BTP
      - '19110:3100'  # BLS
      - '19710:7100'  # WS Relay
    volumes:
      - peer2-data:/data
    networks:
      - toon-sdk-e2e
    depends_on:
      peer1:
        condition: service_healthy
      solana-validator:
        condition: service_healthy
      mina-lightnet:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3100/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
